name: Publish Docker Images

on:
  release:
    types:
      - published
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Image channel to publish"
        required: true
        default: nightly
        type: choice
        options:
          - nightly
          - release
      release_tag:
        description: "Release tag to publish when channel=release, for example v0.20.0rc1"
        required: false
        type: string

concurrency:
  group: publish-docker-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-cuda-image:
    name: Publish CUDA image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      UPSTREAM_REPOSITORY: vllm-project/vllm-omni
      IMAGE_NAME: vllm/vllm-omni
      DOCKERFILE: docker/Dockerfile.cuda

    steps:
      - name: Resolve checkout ref
        id: ref
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          ref="${GITHUB_REF}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${INPUT_CHANNEL}" == "release" ]]; then
            if [[ -z "${INPUT_RELEASE_TAG}" ]]; then
              echo "release_tag is required when channel=release" >&2
              exit 1
            fi
            ref="refs/tags/${INPUT_RELEASE_TAG}"
          fi
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Resolve publish context
        id: context
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_PRERELEASE: ${{ github.event.release.prerelease }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          channel="nightly"
          release_tag=""
          base_image="vllm/vllm-openai:nightly"

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            channel="release"
            release_tag="${EVENT_RELEASE_TAG}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${INPUT_CHANNEL}" == "release" ]]; then
            channel="release"
            release_tag="${INPUT_RELEASE_TAG}"
          fi

          if [[ "${channel}" == "release" ]]; then
            if [[ -z "${release_tag}" ]]; then
              echo "Unable to determine release tag for release publish" >&2
              exit 1
            fi

            if [[ "${release_tag}" =~ rc[0-9]+$ ]]; then
              # Upstream does not currently publish per-RC vllm-openai images,
              # so prerelease omni tags must be layered on top of upstream nightly.
              base_image="vllm/vllm-openai:nightly"
            else
              base_image="vllm/vllm-openai:${release_tag}"
            fi
          fi

          {
            echo "channel=${channel}"
            echo "base_image=${base_image}"
            echo "release_tag=${release_tag}"
            if [[ "${channel}" == "release" && "${EVENT_PRERELEASE}" != "true" && ! "${release_tag}" =~ rc[0-9]+$ ]]; then
              echo "stable_release=true"
            else
              echo "stable_release=false"
            fi
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve push mode
        id: push-mode
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_allowed="false"
          publish_reason="fork-or-missing-secrets"

          if [[ "${GITHUB_REPOSITORY}" == "${UPSTREAM_REPOSITORY}" && -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            publish_allowed="true"
            publish_reason="upstream-with-secrets"
          elif [[ "${GITHUB_REPOSITORY}" != "${UPSTREAM_REPOSITORY}" ]]; then
            publish_reason="non-upstream-repository"
          elif [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            publish_reason="missing-dockerhub-secrets"
          fi

          {
            echo "push=${publish_allowed}"
            if [[ "${publish_allowed}" == "true" ]]; then
              echo "mode=publish"
            else
              echo "mode=build-only"
            fi
            echo "reason=${publish_reason}"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate image tags and labels
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.context.outputs.release_tag }},enable=${{ steps.context.outputs.channel == 'release' }}
            type=raw,value=latest,enable=${{ steps.context.outputs.stable_release == 'true' }}
            type=raw,value=nightly,enable=${{ steps.context.outputs.channel != 'release' }}
            type=raw,value=nightly-{{date 'YYYYMMDD'}},enable=${{ steps.context.outputs.channel != 'release' }}
            type=sha,format=short,prefix=sha-,enable=${{ steps.context.outputs.channel != 'release' }}
          labels: |
            org.opencontainers.image.title=vLLM-Omni
            org.opencontainers.image.description=vLLM-Omni CUDA image built from official vLLM base images.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.context.outputs.release_tag || 'nightly' }}
      - uses: docker/setup-buildx-action@v3

      - name: Announce build-only validation mode
        if: ${{ steps.push-mode.outputs.push != 'true' }}
        run: |
          echo "Skipping Docker Hub publish for reason: ${{ steps.push-mode.outputs.reason }}"
          echo "Running the workflow in build-only mode to validate the Docker build path."

      - name: Log in to Docker Hub
        if: ${{ steps.push-mode.outputs.push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: ${{ steps.push-mode.outputs.push }}
          tags: ${{ steps.docker-meta.outputs.tags }}
          build-args: |
            BASE_IMAGE=${{ steps.context.outputs.base_image }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
